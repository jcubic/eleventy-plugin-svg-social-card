<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xhtml="http://www.w3.org/1999/xhtml"
     viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#fef6e4"/>
  <rect x="60" y="60" width="1080" height="510"
        fill="#fffbf0" stroke="#e4b040" stroke-width="4" rx="12"/>
  <text x="100" y="115" fill="#e4b040" font-size="22"
        font-family="system-ui, sans-serif"
        letter-spacing="4">PAGE</text>

  <foreignObject x="100" y="150" width="1000" height="340">
    <xhtml:div xmlns="http://www.w3.org/1999/xhtml"
               style="font: 700 56px Georgia, serif;
                      color: #2a1f0d; line-height: 1.2;">
      {{ title }}
    </xhtml:div>
  </foreignObject>

  <text x="100" y="530" fill="#806030"
        font-size="24" font-family="Georgia, serif"
        font-style="italic">
    {{ site }}
  </text>
</svg>
