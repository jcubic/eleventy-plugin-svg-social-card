<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xhtml="http://www.w3.org/1999/xhtml"
     viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b12"/>
      <stop offset="1" stop-color="#1f1833"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="40" y="40" width="1120" height="550"
        fill="none" stroke="#ffffff22" stroke-width="2" rx="20"/>
  <text x="80" y="95" fill="#7aa2f7" font-size="22"
        font-family="system-ui, sans-serif"
        letter-spacing="4">ARTICLE</text>

  <foreignObject x="80" y="130" width="1040" height="360">
    <xhtml:div xmlns="http://www.w3.org/1999/xhtml"
               style="font: 700 64px system-ui, sans-serif;
                      color: #fff; line-height: 1.15;">
      {{ title }}
    </xhtml:div>
  </foreignObject>

  <text x="80" y="560" fill="#c0bce0"
        font-size="28" font-family="system-ui, sans-serif">
    {{ author }} · {{ date }}
  </text>
</svg>
